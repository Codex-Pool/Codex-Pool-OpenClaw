name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Setup npm
        run: npm install -g npm@11.8.0

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p \"require('./package.json').version\")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Verify release tag points at origin/main HEAD
        run: |
          git fetch origin main --depth=1
          MAIN_SHA="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$MAIN_SHA" ]; then
            echo "Tag commit ($GITHUB_SHA) does not match origin/main HEAD ($MAIN_SHA)"
            exit 1
          fi

      - name: Run CI checks
        run: npm run ci

      - name: Collect coverage
        run: npm run coverage

      - name: Build release artifacts
        run: npm run build

      - name: Smoke dist output
        run: npm run smoke:dist

      - name: Inspect publish contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
